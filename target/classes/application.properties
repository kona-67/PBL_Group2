# 1. RDSへの接続設定
# 接続するDBを指定。
spring.datasource.url=jdbc:mysql://pbl-group-2.c74c442iwj4m.us-east-1.rds.amazonaws.com:3306/pbl_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Tokyo
