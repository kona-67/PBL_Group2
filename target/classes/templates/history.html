<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服用履歴 - お薬リマインダー</title>
    <link rel="stylesheet" th:href="@{/css/history.css}">
</head>
<body>
    <div class="layout-container">
        
        <!-- ホームに戻る -->
        <div class="top-nav">
            <button id="moveHomeBtn">ホームに戻る</button>
        </div>

        <form th:action="@{/history}" method="get">
            <div class="controls-row">
                <!-- 検索フォーム -->
                <div class="search-section-box">
                    <div class="search-title">検索フォーム</div>
                    <div class="search-form-inner">
                        <input type="text" name="medicineName" th:value="${medicineName}" placeholder="薬の名前">
                        <input type="date" name="date" th:value="${date}">
                        <select name="status">
                            <option value="">服用状況：すべて</option>
                            <option value="服用済み" th:selected="${status == '服用済み'}">服用済み</option>
                            <option value="未服用" th:selected="${status == '未服用'}">未服用</option>
                        </select>
                        <button type="submit" class="btn-submit">検索</button>
                        <a th:href="@{/history}" class="btn-reset">リセット</a>
                    </div>
                </div>

                <!-- ソート -->
                <div class="sort-section-box">
                    <span>ソート: </span>
                    <select name="sort" onchange="this.form.submit()">
                        <option value="desc" th:selected="${currentSort == 'desc'}">新しい順</option>
                        <option value="asc" th:selected="${currentSort == 'asc'}">古い順</option>
                    </select>
                </div>
            </div>
        </form>

        <!-- 履歴欄 -->
        <div class="history-outer-box">
            <div class="history-title">履歴欄</div>
            
            <div class="history-list-wrapper">
                <!-- 履歴リスト -->
                <div th:if="${not #lists.isEmpty(historyList)}">
                    <div th:each="history : ${historyList}" class="history-card">
                        <div class="medicine-info">
                            <span class="medicine-name" th:text="${history.medicineName}">薬の名前</span>
                            <span class="taken-at" th:text="${#temporals.format(history.takenAt, 'yyyy/MM/dd HH:mm')}">2026/06/16 08:00</span>
                        </div>
                        <div class="status-badge" 
                             th:classappend="${history.status == '服用済み' ? 'status-taken' : 'status-not-taken'}"
                             th:text="${history.status}">服用済み</div>
                    </div>
                </div>

                <!-- 履歴がない場合の表示 -->
                <div th:if="${#lists.isEmpty(historyList)}" class="empty-message">
                    <p>履歴はありません。</p>
                </div>
            </div>
        </div>

    </div>
    <script th:src="@{/js/app.js}"></script>
</body>
</html>
