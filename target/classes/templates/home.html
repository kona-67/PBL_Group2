<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>ホーム</title>

    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>

<body class="home">

    <div class="top-area">
        <h1>お薬リマインダー</h1>

        <div class="login-Btn">
            <button class="Btn" id="moveLoginBtn">
                ログイン画面に戻る
            </button>
        </div>
    </div>

    <div class="line"></div>

    <div class="main-area">

        <!-- 左側 -->
        <div class="left-area">

            <div class="add-Btn">
                <p class="text">新規薬登録はこちら</p>
                <button class="Btn" id="moveAddBtn">
                    薬登録画面
                </button>
            </div>

            <div class="history-Btn">
                <p class="text">服用履歴はこちら</p>
                <button class="Btn" id="moveHistoryBtn">
                    服用履歴画面
                </button>
            </div>

            <div class="list-Btn">
                <p class="text">薬一覧はこちら</p>
                <button class="Btn" id="moveListBtn">
                    薬一覧画面
                </button>
            </div>

        </div>

        <!-- 右側 -->
        <div class="right-area">

            <form th:action="@{/notifications/save}" method="post">

                <div class="table-box">

                    <table>

                        <thead>
                            <tr>
                                <th>薬名</th>
                                <th>通知時間</th>
                                <th>曜日</th>
                                <th>通知ON/OFF</th>
                                <th>削除</th>
                            </tr>
                        </thead>

                        <tbody id="notificationTableBody">

                            <tr th:each="notification, stat : ${notificationList}">

                                <input
                                    type="hidden"
                                    th:name="'notifications[' + ${stat.index} + '].notificationId'"
                                    th:value="${notification.notificationId}">

                                <!-- 薬名 -->
                                <td>
                                    <input
                                        type="text"
                                        th:name="'notifications[' + ${stat.index} + '].name'"
                                        th:value="${notification.name}">
                                </td>

                                <!-- 通知時間 -->
                                <td>
                                    <input
                                        type="time"
                                        th:name="'notifications[' + ${stat.index} + '].time'"
                                        th:value="${notification.time}">
                                </td>

                                <!-- 曜日 -->
                                <td>

                                    <input
                                        type="hidden"
                                        class="weekdayValue"
                                        th:name="'notifications[' + ${stat.index} + '].weekday'"
                                        th:value="${notification.weekday}">
                                    
                                    <label>
                                        <input
                                            type="checkbox"
                                            class="weekdayCheckbox"
                                            value="月"
                                            th:checked="${notification.weekday != null and notification.weekday.contains('月')}">    
                                        月
                                    </label>
                                    <label>
                                        <input
                                            type="checkbox"
                                            class="weekdayCheckbox"
                                            value="火"
                                            th:checked="${notification.weekday != null and notification.weekday.contains('火')}">    
                                        火
                                    </label>
                                    <label>
                                        <input
                                            type="checkbox"
                                            class="weekdayCheckbox"
                                            value="水"
                                            th:checked="${notification.weekday != null and notification.weekday.contains('水')}">    
                                        水
                                    </label>
                                    <label>
                                        <input
                                            type="checkbox"
                                            class="weekdayCheckbox"
                                            value="木"
                                            th:checked="${notification.weekday != null and notification.weekday.contains('木')}">    
                                        木
                                    </label>
                                    <label>
                                        <input
                                            type="checkbox"
                                            class="weekdayCheckbox"
                                            value="金"
                                            th:checked="${notification.weekday != null and notification.weekday.contains('金')}">    
                                        金
                                    </label>
                                    <label>
                                        <input
                                            type="checkbox"
                                            class="weekdayCheckbox"
                                            value="土"
                                            th:checked="${notification.weekday != null and notification.weekday.contains('土')}">    
                                        土  
                                    </label>
                                    <label>
                                        <input
                                            type="checkbox"
                                            class="weekdayCheckbox"
                                            value="日"
                                            th:checked="${notification.weekday != null and notification.weekday.contains('日')}">    
                                        日
                                    </label>
                                </td>

                                <!-- ON/OFF -->
                                <td>
                                    <input
                                        type="hidden"
                                        class="enabledValue"
                                        th:name="'notifications[' + ${stat.index} + '].enabled'"
                                        value="false">
                                    <input
                                        type="checkbox"
                                        class="enabledCheckbox"
                                        th:checked="${notification.enabled}">
                                </td>

                                <!-- 削除 -->
                                <td>
                                    <button
                                        type="button"
                                        class="deleteBtn">
                                        削除
                                    </button>
                                </td>

                            </tr>

                        </tbody>

                    </table>

                </div>

                <div class="notification-btn-area">

                    <button
                        type="button"
                        id="addNotificationBtn"
                        class="btn">

                        ＋ 通知追加

                    </button>

                    <button
                        type="submit"
                        id="saveNotificationBtn"
                        class="btn">

                        保存

                    </button>

                </div>

            </form>

        </div>

    </div>

    <script th:src="@{/js/app.js}"></script>

</body>

</html>
