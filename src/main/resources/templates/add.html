<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>薬登録</title>

        <link rel="stylesheet" href="../static/css">   <!---pblのほうではhref="../static/css"にする-->
    </head>


    <body class="add">

        <div class="medicine-name-area">
            <input type="text" id="medicine-name" placeholder="薬"></textarea>
        </div>


        <div class="medicine-input-area">
            <input type="text" id="medicine-volume" placeholder="服用量">
            <input type="text" id="unit" placeholder="単位">
        </div>


        <div class="startday">
            <label for="date">開始日</label>
            <input type="date" id="date">
        </div>


        <div class="finishday">
            <label for="date">終了日</label>
            <input type="date" id="date">
        </div>


        
        <div class="week-area">
            <label>
                <input type="checkbox" name="day" value="月">
                月曜日
            <br></label>
            
            <label>
                <input type="checkbox" name="day" value="火">
                火曜日
            <br></label>

            <label>
                <input type="checkbox" name="day" value="水">
                水曜日
            <br></label>

            <label>
                <input type="checkbox" name="day" value="木">
                木曜日
            <br></label>

            <label>
                <input type="checkbox" name="day" value="金">
                金曜日
            <br></label>

            <label>
                <input type="checkbox" name="day" value="土">
                土曜日
            <br></label>

            <label>
                <input type="checkbox" name="day" value="日">
                日曜日
            <br></label>
        </div>


        <div class="time">
            <label for="time">服用時間</label>
            <input type="time" id="time">
        </div>

    </body>
</html>
