<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>RDSデータ一覧</title>
</head>
<body>
    <h2>現在RDS（AWS）に登録されているユーザー一覧</h2>
    
    <table border="1" style="border-collapse: collapse; width: 500px; text-align: left;">
        <thead>
            <tr style="background-color: #f2f2f2;">
                <th>ID (自動)</th>
                <th>名前</th>
                <th>年齢</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="user : ${userList}">
                <td th:text="${user.id}"></td>
                <td th:text="${user.name}"></td>
                <td th:text="${user.age}"></td>
            </tr>
            <!--each:for文を意味している。今回の場合は変数userの中にuserListの要素が順に代入される-->
        </tbody>
    </table>

    <br>
    <a th:href="@{/test-page}">新しいユーザーを登録する</a>
</body>
</html>
