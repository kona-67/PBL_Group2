<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>フロント・バック連携テスト</title>
</head>
<body>
    <h2>お薬リマインダー：通信テスト</h2>
    <p>フロントエンド(HTML)からバックエンド(Java)へデータを送ります。</p>
    
    <form action="hello" method="post">
        <label>お名前を入力してください：</label>
        <input type="text" name="userName" required>
        <button type="submit">送信する</button>
    </form>
</body>
</html>
